app = "ccs-server"
primary_region = "sjc"

[build]

[[vm]]
  size = "performance-1x"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "15s"
    timeout  = "5s"
    grace_period = "20s"
    method   = "GET"
    path     = "/api/ui/stats"

[env]
  LISTEN_ADDR = ":8080"
  TEMPORAL_HOST      = "ccs-temporal.internal:7233"
  TEMPORAL_NAMESPACE = "default"
  # Secrets (set via `fly secrets set`):
  #   POSTGRES_DSN       — from `fly postgres attach`
  #   TIGERBEETLE_ADDR   — ccs-tigerbeetle.internal:3000
