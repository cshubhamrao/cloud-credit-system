app = "ccs-temporal"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile.temporal"

[[vm]]
  size   = "shared-cpu-2x"
  memory = "512mb"

# No [http_service] — Temporal speaks gRPC only.
# Accessible within the org via ccs-temporal.internal:7233 (Fly 6PN).

[env]
  DB                          = "postgres12"
  DB_PORT                     = "5432"
  DYNAMIC_CONFIG_FILE_PATH    = "config/dynamicconfig/production-sql.yaml"
  DEFAULT_NAMESPACE_RETENTION = "72h"
  # Secrets (set via `fly secrets set --app ccs-temporal`):
  #   POSTGRES_SEEDS   — Fly Postgres internal hostname (e.g. ccs-postgres.internal)
  #   POSTGRES_USER    — database user
  #   POSTGRES_PWD     — database password
