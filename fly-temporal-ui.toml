app = "ccs-temporal-ui"
primary_region = "sjc"

[build]
  image = "temporalio/ui:2.48.1"

[[vm]]
  size   = "shared-cpu-1x"
  memory = "256mb"

[http_service]
  internal_port       = 8080
  force_https         = true
  auto_stop_machines  = "stop"
  auto_start_machines = true
  min_machines_running = 0

[env]
  TEMPORAL_ADDRESS      = "ccs-temporal.internal:7233"
  TEMPORAL_CORS_ORIGINS = "https://ccs-temporal-ui.fly.dev"
