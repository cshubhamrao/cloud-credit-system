system.forceSearchAttributesCacheRefreshOnRead:
  - value: true
    constraints: {}

frontend.enableUpdateWorkflowExecution:
  - value: true
    constraints: {}

frontend.enableUpdateWorkflowExecutionAsyncAccepted:
  - value: true
    constraints: {}

frontend.workerHeartbeatsEnabled:
  - value: true
    constraints: {}

# Delete closed workflow history and visibility records after retention expires
worker.workflowExecutionScavengerEnabled:
  - value: true
    constraints: {}

# Run scavenger every 15 minutes (default is 1h; shorter for dev)
worker.executionScavengerInterval:
  - value: 15m
    constraints: {}
